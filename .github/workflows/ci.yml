name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements-dev.txt && pip install -e .
      - name: Lint
        run: ruff check . && ruff format --check .
      - name: Unit tests
        run: pytest tests/unit --cov=vic_suburbs --cov-report=term-missing

  bundle-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - name: Validate bundle (dev)
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          if [ -z "$DATABRICKS_HOST" ]; then
            echo "::notice::DATABRICKS_HOST/DATABRICKS_TOKEN secrets not set — skipping bundle validate."
            echo "Add them under Settings → Secrets and variables → Actions to validate against the workspace."
            exit 0
          fi
          databricks bundle validate -t dev
