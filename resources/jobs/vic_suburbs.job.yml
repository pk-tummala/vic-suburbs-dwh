# Orchestration job: pre-task (open run log) -> pipeline -> post-task (summarise/close).
resources:
  jobs:
    vic_suburbs_job:
      name: "[${bundle.target}] vic_suburbs_job"
      tags:
        project: vic_suburbs
        env: ${bundle.target}
      email_notifications:
        on_failure:
          - ${var.notification_email}
      schedule:
        quartz_cron_expression: "0 0 6 ? * MON"   # weekly; paused automatically in dev
        timezone_id: Australia/Melbourne
        pause_status: UNPAUSED                    # dev (mode: development) auto-pauses this
      tasks:
        - task_key: open_run_log
          max_retries: 0
          notebook_task:
            notebook_path: ../../src/vic_suburbs/orchestration/pre_task.py
            base_parameters:
              env: ${bundle.target}
              catalog: ${var.catalog}
              src_path: ${workspace.file_path}/src
              run_id: "{{job.run_id}}"

        - task_key: build_lakehouse
          max_retries: 0
          depends_on:
            - task_key: open_run_log
          pipeline_task:
            pipeline_id: ${resources.pipelines.vic_suburbs_pipeline.id}

        - task_key: build_reporting
          max_retries: 0
          depends_on:
            - task_key: build_lakehouse
          notebook_task:
            notebook_path: ../../src/vic_suburbs/orchestration/build_reporting.py
            base_parameters:
              env: ${bundle.target}
              catalog: ${var.catalog}
              src_path: ${workspace.file_path}/src
              run_id: "{{job.run_id}}"

        - task_key: close_run_log
          max_retries: 0
          depends_on:
            - task_key: build_reporting
          notebook_task:
            notebook_path: ../../src/vic_suburbs/orchestration/post_task.py
            base_parameters:
              env: ${bundle.target}
              catalog: ${var.catalog}
              src_path: ${workspace.file_path}/src
              run_id: "{{job.run_id}}"
