# AI/BI dashboard: the six question views + pipeline health, served from the Gold/reporting layer.
# The .lvdash.json is generated by tools/build_dashboard.py (run `make dashboard`).
resources:
  dashboards:
    vic_suburbs_dashboard:
      display_name: "[${bundle.target}] Victoria Suburbs Profiler"
      # Path is relative to THIS file's directory (same convention as the bundle-examples repo).
      file_path: vic_suburbs.lvdash.json
      # Warehouse that runs the dashboard's queries — resolved by name (see databricks.yml).
      warehouse_id: ${var.warehouse_id}
      # Inject the per-target catalog so the dataset queries can stay catalog-less
      # (`04_reporting`.vw_q1_... resolves under ${var.catalog} at deploy). Requires Databricks
      # CLI v0.287.0+. If on an older CLI, bake the catalog into the queries instead
      # (tools/build_dashboard.py) and drop this line.
      dataset_catalog: ${var.catalog}
      # embed_credentials: false           # default — each viewer uses their own credentials
      # parent_path: ${workspace.resource_path}   # default — under the bundle deployment root
